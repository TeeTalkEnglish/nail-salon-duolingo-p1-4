// ==============================================
//  STATE
// ==============================================
var currentRound = 0;
var score = 0;
var totalRounds = rounds.length;

// Count only scoring rounds
var scoringRounds = 0;
for (var i = 0; i < rounds.length; i++) {
    if (rounds[i].type !== "info") scoringRounds++;
}
var chatHistory = [];

// ==============================================
//  INIT
// ==============================================
window.onload = function() {

};

function restartGame() {
    currentRound = 0;
    score = 0;
    chatHistory = [];
    document.getElementById("completion-screen").style.display = "none";
    document.getElementById("game-area").style.display = "block";
    document.getElementById("salon-scene").style.display = "block";
    document.getElementById("chat-window").style.display = "block";
    document.querySelector(".progress-container").style.display = "block";
    updateScore();
    loadRound();
}

// ==============================================
//  SCORE & PROGRESS
// ==============================================
function updateScore() {
    document.getElementById("score").textContent = score;
    document.getElementById("total").textContent = scoringRounds;
}

function updateProgress() {
    var pct = (currentRound / totalRounds) * 100;
    document.getElementById("progress-bar").style.width = pct + "%";
    document.getElementById("progress-text").textContent = "Step " + (currentRound + 1) + " of " + totalRounds;
}

// ==============================================
//  CHAT
// ==============================================
function renderChat() {
    var chatDiv = document.getElementById("chat-window");

    if (chatHistory.length === 0) {
        chatDiv.innerHTML = '<div class="chat-placeholder"><p>💬 Your conversation will build here as you play...</p></div>';
        return;
    }

    var html = "";
    for (var i = 0; i < chatHistory.length; i++) {
        var msg = chatHistory[i];
        // Only show nail tech lines
        if (msg.speaker === "client") continue;
        var label = "💅 Nail Tech";
        html += '<div class="chat-bubble tech">';
        html += '<span class="chat-label">' + label + '</span>';
        html += '<div class="chat-text">' + msg.text + '</div>';
        html += '</div>';
    }

    if (html === "") {
        chatDiv.innerHTML = '<div class="chat-placeholder"><p>💬 Your conversation will build here as you play...</p></div>';
        return;
    }

    chatDiv.innerHTML = html;
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

function addChatMessages(messages) {
    for (var i = 0; i < messages.length; i++) {
        var msg = messages[i];
        var exists = false;
        for (var j = 0; j < chatHistory.length; j++) {
            if (chatHistory[j].text === msg.text && chatHistory[j].speaker === msg.speaker) {
                exists = true;
                break;
            }
        }
        if (!exists) {
            chatHistory.push(msg);
        }
    }
    renderChat();
}

function showFeedback(isCorrect, message) {
    var fb = document.getElementById("feedback");
    var content = document.getElementById("feedback-content");
    fb.style.display = "block";
    fb.className = "feedback " + (isCorrect ? "correct" : "wrong");

    if (isCorrect) {
        content.innerHTML = '<span class="result-icon">✅</span> <strong>Correct!</strong> Great job!';
    } else {
        content.innerHTML = '<span class="result-icon">❌</span> <strong>Not quite.</strong><br>' + message;
    }
}

function hideFeedback() {
    document.getElementById("feedback").style.display = "none";
}

// ==============================================
//  WORD HELP (HINT SYSTEM)
// ==============================================
function setupHint(round) {
    var helpDiv = document.getElementById("word-help");
    if (!round.helpWord) {
        helpDiv.style.display = "none";
        return;
    }

    helpDiv.style.display = "block";
    helpDiv.innerHTML = '<div id="hint-btn" onclick="openHint()" style="cursor:pointer; font-weight:700; color:#f57f17; font-size:0.95em; padding:6px 0;">' +
        '💡 Need a Hint? <span style="font-size:0.8em; color:#999;">(tap to see)</span>' +
        '</div>' +
        '<div id="hint-content" style="display:none; margin-top:8px; padding-top:8px; border-top:1px dashed #fbc02d;">' +
        '<span style="display:inline-block; background:white; padding:2px 10px; border-radius:6px; font-weight:700; color:#880e4f; margin-right:5px;">' + round.helpWord + '</span> ' +
        '<span style="color:#888; font-style:italic; font-size:0.88em;">' + round.helpVn + '</span><br>' +
        '<span style="color:#666; font-size:0.88em;">' + round.helpEx + '</span>' +
        '</div>';
}

function openHint() {
    var content = document.getElementById("hint-content");
    var btn = document.getElementById("hint-btn");
    if (content) content.style.display = "block";
    if (btn) { btn.innerHTML = "💡 Word Help"; btn.style.cursor = "default"; btn.onclick = null; }
}

function revealHint() {
    var content = document.getElementById("hint-content");
    var btn = document.getElementById("hint-btn");
    if (content) content.style.display = "block";
    if (btn) { btn.innerHTML = "💡 Word Help"; btn.style.cursor = "default"; btn.onclick = null; }
}

function hideHint() {
    document.getElementById("word-help").style.display = "none";
}

// ==============================================
//  SAY SENTENCE BOX
// ==============================================
    function getSayBox(round) {
        return "";
    }

    function showSayBox(round) {
        if (!round.saySentence) return;
        var area = document.getElementById("game-area");
        var existing = document.getElementById("say-box");
        if (existing) return;

        var div = document.createElement("div");
        div.id = "say-box";
        div.style.cssText = "background:linear-gradient(135deg,#e8f5e9,#c8e6c9); border:2px solid #81c784; border-radius:12px; padding:14px 20px; margin-top:15px; text-align:center; animation:bubbleIn 0.4s ease;";
        div.innerHTML = '<span style="font-weight:700; color:#2e7d32; font-size:0.9em;">🗣️ Now say it out loud:</span> ' +
            '<span style="color:#1b5e20; font-size:1.05em; font-style:italic;">"' + round.saySentence + '"</span>';
        area.appendChild(div);
    }

// ==============================================
//  LOAD ROUND
// ==============================================
       function loadRound() {
        if (currentRound >= rounds.length) {
            showCompletion();
            return;
        }

        var round = rounds[currentRound];
        updateProgress();
        hideFeedback();
        hideHint();
        renderChat();

        var area = document.getElementById("game-area");
        area.style.display = "block";

        // Hide the next button for fresh round
        var nextArea = document.getElementById("next-btn-area");
        if (nextArea) nextArea.style.display = "none";

        if (round.type === "fill") {
            setupHint(round);
            renderFill(round, area);
        } else if (round.type === "choice") {
            setupHint(round);
            renderChoice(round, area);
        } else if (round.type === "info") {
            renderInfo(round, area);
        }
    }
   
    function goNext() {
        currentRound++;
        // Skip info rounds automatically if they somehow get stuck
        if (currentRound < rounds.length && rounds[currentRound].type === "info") {
            // Don't skip — loadRound will render the info screen
        }
        loadRound();
    }

   // ==============================================
//  SHUFFLE
// ==============================================
function shuffleArray(arr) {
    var shuffled = arr.slice();
    for (var i = shuffled.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = shuffled[i];
        shuffled[i] = shuffled[j];
        shuffled[j] = temp;
    }
    return shuffled;
}

// ==============================================
//  FILL IN THE BLANK
// ==============================================
function renderFill(round, container) {
    var shuffledWords = shuffleArray(round.choices);
    var html = '';
    html += '<div class="round-title">' + round.title + '</div>';
    html += '<div class="round-instruction">' + round.instruction + '</div>';
    html += '<div class="blank-sentence">';
    html += round.pre;
    html += '<span class="blank" id="blank-slot">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>';
    html += round.post;
    html += '</div>';
    html += '<div class="word-choices">';
    for (var i = 0; i < shuffledWords.length; i++) {
        html += '<div class="word-choice" data-word="' + shuffledWords[i] + '" onclick="clickFill(this)">' + shuffledWords[i] + '</div>';
    }
    html += '</div>';
    html += '<div class="next-btn-area" id="next-btn-area" style="display:none;">';
    html += '<button class="btn btn-primary" onclick="goNext()">Next →</button>';
    html += '</div>';
    container.innerHTML = html;
}

function clickFill(el) {
    var round = rounds[currentRound];
    var selected = el.getAttribute("data-word");
    var answer = round.answer;
    var isCorrect = (selected.toLowerCase() === answer.toLowerCase());

    var choices = document.querySelectorAll(".word-choice");
    for (var i = 0; i < choices.length; i++) {
        choices[i].style.pointerEvents = "none";
        choices[i].classList.add("disabled");
        if (choices[i].getAttribute("data-word").toLowerCase() === answer.toLowerCase()) {
            choices[i].classList.add("correct");
        }
        if (choices[i].getAttribute("data-word") === selected && !isCorrect) {
            choices[i].classList.add("wrong");
        }
    }

    var blank = document.getElementById("blank-slot");
    blank.textContent = answer;
    blank.style.borderBottomStyle = "solid";
    blank.style.borderBottomColor = isCorrect ? "#4caf50" : "#ef5350";

    if (isCorrect) {
        score++;
        updateScore();
        showFeedback(true, "");
    } else {
        showFeedback(false, "The correct word is: <strong>" + answer + "</strong>");
    }

    addChatMessages(round.chatAfter);
    revealHint();
    showSayBox(round);
    document.getElementById("next-btn-area").style.display = "block";
}

// ==============================================
//  MULTIPLE CHOICE
// ==============================================
function renderChoice(round, container) {
    var shuffled = shuffleArray(round.choices);
    var html = '';
    html += '<div class="round-title">' + round.title + '</div>';
    html += '<div class="round-instruction">' + round.instruction + '</div>';
    html += '<div class="choice-options">';
    for (var i = 0; i < shuffled.length; i++) {
        html += '<div class="choice-option" onclick="clickChoice(this)">' + shuffled[i] + '</div>';
    }
    html += '</div>';
    html += '<div class="next-btn-area" id="next-btn-area" style="display:none;">';
    html += '<button class="btn btn-primary" onclick="goNext()">Next →</button>';
    html += '</div>';
    container.innerHTML = html;
}

function clickChoice(el) {
    var round = rounds[currentRound];
    var selected = el.textContent;
    var answer = round.answer;
    var isCorrect = (selected === answer);

    var opts = document.querySelectorAll(".choice-option");
    for (var i = 0; i < opts.length; i++) {
        opts[i].style.pointerEvents = "none";
        opts[i].classList.add("disabled");
        if (opts[i].textContent === answer) {
            opts[i].classList.add("correct");
        }
    }
    if (!isCorrect) {
        el.classList.add("wrong");
    }

    if (isCorrect) {
        score++;
        updateScore();
        showFeedback(true, "");
    } else {
        showFeedback(false, 'The best answer is:<br><strong>"' + answer + '"</strong>');
    }

    addChatMessages(round.chatAfter);
    revealHint();
    showSayBox(round);
    document.getElementById("next-btn-area").style.display = "block";
}

// ==============================================
//  INFO SCREEN (no scoring)

function renderInfo(round, container) {
    var html = '';
    html += '<div style="text-align:center; padding:20px 10px;">';
    html += '<div style="font-size:3em; margin-bottom:15px;">🔄</div>';
    html += '<div class="round-title" style="font-size:1.3em; margin-bottom:15px;">' + round.title + '</div>';
    html += '<div style="font-size:1em; color:#555; line-height:1.8; max-width:500px; margin:0 auto 20px;">' + round.instruction + '</div>';
    html += '<button class="btn btn-primary" onclick="goNext()">Got it! Next →</button>';
    html += '</div>';
    container.innerHTML = html;
}

    document.getElementById("word-help").style.display = "none";
    document.getElementById("chat-window").style.display = "none";
    document.querySelector(".progress-container").style.display = "none";
    hideFeedback();

    var screen = document.getElementById("completion-screen");
    screen.style.display = "block";

    document.getElementById("final-score").textContent = "You got " + score + " out of " + scoringRounds + " correct!";

    var pct = score / scoringRounds;
    var starCount = 0;
    if (pct === 1) starCount = 5;
    else if (pct >= 0.8) starCount = 4;
    else if (pct >= 0.6) starCount = 3;
    else if (pct >= 0.4) starCount = 2;
    else if (pct > 0) starCount = 1;

    var starHTML = "";
    for (var i = 0; i < starCount; i++) starHTML += "⭐";
    for (var i = starCount; i < 5; i++) starHTML += "☆";
    document.getElementById("stars").innerHTML = starHTML;

    var msg = "";
    if (pct === 1) msg = "Perfect! You can make great small talk! 🎉";
    else if (pct >= 0.8) msg = "Excellent! You're almost a pro! 💪";
    else if (pct >= 0.5) msg = "Good work! Practice more to get better! 📚";
    else msg = "Keep practicing! You'll get it! 🌱";
    document.getElementById("completion-message").textContent = msg;

    var reviewHTML = "";
    for (var i = 0; i < fullDialog.length; i++) {
        var line = fullDialog[i];
        var label = (line.speaker === "tech") ? "💅 Nail Tech:" : "👩 Customer:";
        reviewHTML += '<div class="review-line ' + line.speaker + '">';
        reviewHTML += '<span class="review-speaker">' + label + '</span> ';
        reviewHTML += line.text;
        reviewHTML += '</div>';
    }
    document.getElementById("review-dialog").innerHTML = reviewHTML;
}
</script>
</script>
</body>
</html>
